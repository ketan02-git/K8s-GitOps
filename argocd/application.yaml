apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-k8s-status
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ketan02-git/k8s-gitops'
    targetRevision: main
    path: helm-chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true